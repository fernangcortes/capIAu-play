<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CapIAu Streaming</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
    </style>
</head>
<body>
    <script src="tizen/tizen-bridge.js"></script>
    <script>
        // CapIAu Tizen Entry Point
        // Loads the built jellyfin-web from the www/ directory
        
        // Register Tizen remote control keys
        if (window.tizen && tizen.tvinputdevice) {
            var keys = [
                'MediaPlay', 'MediaPause', 'MediaStop',
                'MediaRewind', 'MediaFastForward',
                'MediaPlayPause', 'MediaTrackPrevious', 'MediaTrackNext',
                'ColorF0Red', 'ColorF1Green', 'ColorF2Yellow', 'ColorF3Blue',
                'ChannelUp', 'ChannelDown',
                'Info', 'Guide'
            ];
            keys.forEach(function(key) {
                try {
                    tizen.tvinputdevice.registerKey(key);
                } catch (e) {
                    console.warn('Failed to register key:', key, e);
                }
            });
        }

        // Handle Tizen back button
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 10009) { // Tizen Back key
                // Let the CapIAu sidebar handle it first
                var sidebar = document.getElementById('capiau-sidebar');
                if (sidebar && sidebar.classList.contains('is-open')) {
                    return; // capiauSidebar.js handles this
                }
                
                // Otherwise, handle navigation back or exit
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    try {
                        tizen.application.getCurrentApplication().exit();
                    } catch (ex) {
                        console.error('Failed to exit app:', ex);
                    }
                }
            }
        });

        // Handle Tizen visibility change (suspend/resume)
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                console.log('[CapIAu Tizen] App suspended');
            } else {
                console.log('[CapIAu Tizen] App resumed');
                // Reconnect WebSocket if needed
                if (window.ApiClient) {
                    window.ApiClient.ensureWebSocket();
                }
            }
        });

        // Load the CapIAu web app
        window.location.href = 'www/index.html';
    </script>
</body>
</html>
